name: CI:Deploy - Build Pre-Mined Blockchain Image

on:
  pull_request:
    types: [closed]

jobs:
  deploy-premined:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'CI:Deploy')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create .env file for backend
        env:
          FIREBASE_TYPE: ${{ secrets.FIREBASE_TYPE }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY_ID: ${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_CLIENT_ID: ${{ secrets.FIREBASE_CLIENT_ID }}
          FIREBASE_AUTH_URI: ${{ secrets.FIREBASE_AUTH_URI }}
          FIREBASE_TOKEN_URI: ${{ secrets.FIREBASE_TOKEN_URI }}
          FIREBASE_AUTH_PROVIDER_CERT_URL: ${{ secrets.FIREBASE_AUTH_PROVIDER_CERT_URL }}
          FIREBASE_CLIENT_CERT_URL: ${{ secrets.FIREBASE_CLIENT_CERT_URL }}
          FIREBASE_UNIVERSE_DOMAIN: ${{ secrets.FIREBASE_UNIVERSE_DOMAIN }}
        run: |
          node -e "
            const fs = require('fs');
            const keys = [
              'FIREBASE_TYPE','FIREBASE_PROJECT_ID','FIREBASE_PRIVATE_KEY_ID',
              'FIREBASE_PRIVATE_KEY','FIREBASE_CLIENT_EMAIL','FIREBASE_CLIENT_ID',
              'FIREBASE_AUTH_URI','FIREBASE_TOKEN_URI','FIREBASE_AUTH_PROVIDER_CERT_URL',
              'FIREBASE_CLIENT_CERT_URL','FIREBASE_UNIVERSE_DOMAIN'
            ];
            let out = 'BACKEND_API_URL=http://localhost:9001\n';
            for (const key of keys) {
              const val = (process.env[key] || '').split('\n').join('\\\\n');
              out += key + '=\"' + val + '\"\n';
            }
            fs.writeFileSync('backend/.env', out);
            console.log('backend/.env written:', out.split('\n').length - 1, 'lines');
          "
          echo "Variable count: $(grep -c '=' backend/.env)"

      - name: Start devnet
        run: docker compose up -d

      - name: Check devnet health
        run: |
          echo "Waiting for backend (up to 120s)..."
          timeout 120 bash -c 'until curl -sf http://localhost:9001/blockchain > /dev/null; do
            echo "  not ready, retrying in 3s..."
            sleep 3
          done'
          echo "Backend is ready!"

      - name: Show docker logs on failure
        if: failure()
        run: |
          echo "=== Container status ==="
          docker compose ps
          echo "=== Backend logs ==="
          docker compose logs backend --tail=60
          echo "=== .env keys (no values) ==="
          cut -d= -f1 backend/.env

      - name: Install script dependencies
        run: cd scripts && npm install

      - name: Clear existing blockchain data
        run: |
          curl -sf -X DELETE http://localhost:9001/blockchain || true
          docker compose restart backend
          echo "Waiting for backend after restart (up to 60s)..."
          timeout 60 bash -c 'until curl -sf http://localhost:9001/blockchain > /dev/null; do sleep 2; done'
          echo "Backend ready!"

      - name: Populate devnet with pre-mined blockchain
        run: cd scripts && npm run populate

      - name: Verify blockchain state
        run: cd scripts && npm run verify

      - name: Stop devnet
        run: docker compose down

      - name: Build and push pre-mined backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:pre-mined
            ${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:pre-mined-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:latest
          cache-to: type=inline

      - name: Build and push pre-mined frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:pre-mined
            ${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:pre-mined-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:latest
          cache-to: type=inline

      - name: Test pre-mined images
        run: |
          docker compose up -d
          echo "Waiting for backend (up to 120s)..."
          timeout 120 bash -c 'until curl -sf http://localhost:9001/blockchain > /dev/null; do sleep 3; done'
          cd scripts && npm test
          cd .. && docker compose down

      - name: Output summary
        run: |
          echo "## Pre-Mined Blockchain Images Built Successfully! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images pushed to Docker Hub:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:pre-mined\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:pre-mined\`" >> $GITHUB_STEP_SUMMARY
