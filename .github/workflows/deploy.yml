name: CI:Deploy - Build Pre-Mined Blockchain Image

on:
  pull_request:
    types: [closed]

jobs:
  deploy-premined:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'CI:Deploy')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create .env file for backend
        run: |
          cd backend
          cat > .env << EOF
          FIREBASE_TYPE=${{ secrets.FIREBASE_TYPE }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_PRIVATE_KEY_ID=${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_CLIENT_ID=${{ secrets.FIREBASE_CLIENT_ID }}
          FIREBASE_AUTH_URI=${{ secrets.FIREBASE_AUTH_URI }}
          FIREBASE_TOKEN_URI=${{ secrets.FIREBASE_TOKEN_URI }}
          FIREBASE_AUTH_PROVIDER_CERT_URL=${{ secrets.FIREBASE_AUTH_PROVIDER_CERT_URL }}
          FIREBASE_CLIENT_CERT_URL=${{ secrets.FIREBASE_CLIENT_CERT_URL }}
          FIREBASE_UNIVERSE_DOMAIN=${{ secrets.FIREBASE_UNIVERSE_DOMAIN }}
          EOF

      - name: Start devnet with docker-compose
        run: |
          docker compose up -d
          echo "Waiting for services to be ready..."
          sleep 10

      - name: Check devnet health
        run: |
          echo "Checking backend health..."
          timeout 60 bash -c 'until curl -f http://localhost:9001/blockchain; do sleep 2; done'
          echo "Backend is ready!"

      - name: Install script dependencies
        run: |
          cd scripts
          npm install

      - name: Clear existing blockchain data
        run: |
          echo "Clearing any existing blockchain data..."
          curl -X DELETE http://localhost:9001/blockchain || true

      - name: Populate devnet with pre-mined blockchain
        run: |
          cd scripts
          npm run populate
          echo "Blockchain populated successfully!"

      - name: Verify blockchain state
        run: |
          cd scripts
          npm run verify

      - name: Stop devnet
        run: docker compose down

      - name: Build and push pre-mined backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:pre-mined
            ${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:pre-mined-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:latest
          cache-to: type=inline

      - name: Build and push pre-mined frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:pre-mined
            ${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:pre-mined-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:latest
          cache-to: type=inline

      - name: Test pre-mined images
        run: |
          echo "Starting pre-mined images for testing..."
          docker compose up -d

          echo "Waiting for services to be ready..."
          sleep 10

          echo "Running tests against pre-mined blockchain..."
          cd scripts
          npm test

          echo "Tests passed! Stopping containers..."
          cd ..
          docker compose down

      - name: Output summary
        run: |
          echo "## Pre-Mined Blockchain Images Built Successfully! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images pushed to Docker Hub:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:pre-mined\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:pre-mined\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To run the pre-mined blockchain:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 9001:9001 ${{ secrets.DOCKER_USERNAME }}/blockchain101-backend:pre-mined" >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 9000:80 ${{ secrets.DOCKER_USERNAME }}/blockchain101-frontend:pre-mined" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
