services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blockchain101-backend
    ports:
      - "9001:9001"
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=http://localhost:9001
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - blockchain-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9001/mempool"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blockchain101-frontend
    ports:
      - "9000:80"
    environment:
      - BACKEND_HOST=backend
      - BACKEND_RESOLVER=127.0.0.11
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - blockchain-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  blockchain-network:
    driver: bridge
