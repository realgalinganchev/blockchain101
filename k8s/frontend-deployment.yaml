apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockchain101-frontend
  namespace: blockchain101
  labels:
    app: blockchain101-frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: blockchain101-frontend
  template:
    metadata:
      labels:
        app: blockchain101-frontend
    spec:
      containers:
      - name: frontend
        image: galinganchev/blockchain101-frontend:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
